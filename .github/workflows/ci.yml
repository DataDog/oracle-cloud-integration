name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - lib
          - metrics-forwarder
          - logs-forwarder
          - events-forwarder
    defaults:
      run:
        working-directory: datadog-functions/${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: datadog-functions/${{ matrix.module }}/go.mod
          cache-dependency-path: datadog-functions/${{ matrix.module }}/go.sum

      - name: Download modules
        run: go mod download

      - name: Verify go.mod and go.sum
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./...

  terraform-fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7

      - name: Check formatting
        run: |
          terraform fmt -check -recursive \
            datadog-integration \
            datadog-terraform-onboarding

  terraform-validate:
    name: Terraform validate (${{ matrix.directory }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - datadog-integration
          - datadog-terraform-onboarding
          - datadog-integration/modules/regional-stacks
          - datadog-terraform-onboarding/modules/regional-stacks
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7

      - name: Init
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate
