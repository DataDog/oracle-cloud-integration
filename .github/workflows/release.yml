name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build and upload assets to a draft release, then delete it."
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for dd-octo-sts OIDC token exchange
    steps:
      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        id: octo-sts
        with:
          scope: DataDog/oracle-cloud-integration
          policy: self.github.release.main

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read version from VERSION file
        id: version
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/master" ]]; then
            echo "ERROR: release workflow must run from master (got $GITHUB_REF)"
            exit 1
          fi
          semver=$(cat VERSION | tr -d '[:space:]')
          if [[ -z "$semver" ]]; then
            echo "ERROR: VERSION file is empty"
            exit 1
          fi
          if [[ ! "$semver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION file must contain X.Y.Z, got: $semver"
            exit 1
          fi
          version="datadog-integration-v${semver}"
          # Fail if this tag already exists (prevents duplicate releases)
          if gh api "repos/${GH_REPO}/git/ref/tags/${version}" 2>/dev/null; then
            echo "ERROR: tag $version already exists — update VERSION file before releasing"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag
        id: create-tag
        if: inputs.dry_run == false
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh api "repos/${GH_REPO}/git/refs" \
            --method POST \
            --raw-field "ref=refs/tags/${VERSION}" \
            --raw-field "sha=${GITHUB_SHA}"

      - name: Create release
        id: create-release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            gh release create "${VERSION}" \
              --repo "${GH_REPO}" \
              --title "${VERSION}" \
              --generate-notes \
              --target "${GITHUB_SHA}" \
              --draft \
              --latest=false \
              --fail-on-no-commits
          else
            gh release create "${VERSION}" \
              --repo "${GH_REPO}" \
              --title "${VERSION}" \
              --generate-notes \
              --verify-tag \
              --latest=false \
              --fail-on-no-commits
          fi

      - name: Build artifacts
        working-directory: datadog-integration
        run: |
          cp ../VERSION .
          zip -r ../datadog-integration.zip ./*

      - name: Upload assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${VERSION}" datadog-integration.zip \
            --repo "${GH_REPO}"

      - name: Mark as latest
        if: inputs.dry_run == false
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${VERSION}" --latest --repo "${GH_REPO}"

      - name: Delete draft release
        if: always() && inputs.dry_run == true && steps.create-release.conclusion == 'success'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete "${VERSION}" --repo "${GH_REPO}" --yes

      - name: Delete release and tag on failure
        if: steps.create-tag.conclusion == 'success' && failure()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete "${VERSION}" --repo "${GH_REPO}" --yes --cleanup-tag 2>/dev/null || \
            gh api "repos/${GH_REPO}/git/refs/tags/${VERSION}" --method DELETE
