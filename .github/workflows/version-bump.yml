name: Bump Version

on:
  pull_request:
    paths:
      - 'datadog-integration/**'
      - 'datadog-terraform-onboarding/**'

# One run per PR at a time; cancel the stale run when a new push arrives.
# Known limitation: two concurrent PRs that both auto-bump will compute the
# same patch version from the same base; the second merge will be a no-op bump.
# This is only a problem when "require branches to be up to date" is not enforced.
concurrency:
  group: version-bump-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    name: Bump patch version
    runs-on: ubuntu-latest
    # Only runs on same-repo PRs; GITHUB_TOKEN cannot push to a fork branch.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute and write versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.base_ref }}
          REPO: ${{ github.repository }}
        run: bash scripts/bump-version.sh

      - name: Commit and push
        if: steps.versions.outputs.skip == 'false'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          BASE_VERSION: ${{ steps.versions.outputs.base_version }}
          BUMPED_VERSION: ${{ steps.versions.outputs.bumped_version }}
          HEAD_REF: ${{ github.head_ref }}
        with:
          script: |
            const fs = require('fs');
            const from = process.env.BASE_VERSION;
            const to   = process.env.BUMPED_VERSION;
            const branch = process.env.HEAD_REF;

            // Resolve current branch HEAD
            const refData = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `heads/${branch}`,
            });
            const parentSha = refData.data.object.sha;

            const parentCommit = await github.rest.git.getCommit({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              commit_sha: parentSha,
            });

            // Build a tree with both VERSION files
            const tree = await github.rest.git.createTree({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              base_tree: parentCommit.data.tree.sha,
              tree: [
                {
                  path:    'VERSION',
                  mode:    '100644',
                  type:    'blob',
                  content: fs.readFileSync('VERSION', 'utf8'),
                },
                {
                  path:    'datadog-terraform-onboarding/VERSION',
                  mode:    '100644',
                  type:    'blob',
                  content: fs.readFileSync('datadog-terraform-onboarding/VERSION', 'utf8'),
                },
              ],
            });

            // Commit via REST API — GitHub auto-signs these as "Verified"
            const BOT_AUTHOR = {
              name:  'github-actions[bot]',
              email: '41898282+github-actions[bot]@users.noreply.github.com',
            };
            const commit = await github.rest.git.createCommit({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              message:   `chore: bump version ${from} -> ${to}`,
              tree:      tree.data.sha,
              parents:   [parentSha],
              author:    BOT_AUTHOR,
              committer: BOT_AUTHOR,
            });

            // force: true is safe here because the concurrency group ensures only one
            // instance of this workflow runs per PR at a time (cancel-in-progress: true).
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `heads/${branch}`,
              sha:   commit.data.sha,
              force: true,
            });

      - name: Comment on PR
        if: steps.versions.outputs.skip == 'false'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          BASE_VERSION: ${{ steps.versions.outputs.base_version }}
          BUMPED_VERSION: ${{ steps.versions.outputs.bumped_version }}
        with:
          script: |
            const from = process.env.BASE_VERSION;
            const to   = process.env.BUMPED_VERSION;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `**Version bumped:** \`${from}\` → \`${to}\` (patch auto-bump)`,
                '',
                'Override if needed:',
                '- **Breaking change** → manually set `VERSION` and `datadog-terraform-onboarding/VERSION` to bump the **major** digit.',
                '- **New feature** → manually bump the **minor** digit.',
                '- **Minor bug fix** → no change needed; the patch bump above is correct.',
              ].join('\n'),
            });
